apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: kubeintel
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-role
  namespace: kubeintel
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-rolebinding
  namespace: kubeintel
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: kubeintel
roleRef:
  kind: Role
  name: prometheus-role
  apiGroup: rbac.authorization.k8s.io
