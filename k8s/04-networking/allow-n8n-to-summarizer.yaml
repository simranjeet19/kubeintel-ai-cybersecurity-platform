apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-n8n-to-summarizer
  namespace: kubeintel
spec:
  podSelector:
    matchLabels:
      app: summarizer-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: n8n
      ports:
        - protocol: TCP
          port: 8000
