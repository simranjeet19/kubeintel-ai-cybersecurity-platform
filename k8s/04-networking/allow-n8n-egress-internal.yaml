apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-n8n-egress-internal
  namespace: kubeintel
spec:
  podSelector:
    matchLabels:
      app: n8n
  policyTypes:
    - Egress
  egress:
    # reach summarizer-api
    - to:
        - podSelector:
            matchLabels:
              app: summarizer-api
      ports:
        - protocol: TCP
          port: 8000
    # reach postgres
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # reach external APIs (NVD, CISA, etc.)
    - ports:
        - protocol: TCP
          port: 443
