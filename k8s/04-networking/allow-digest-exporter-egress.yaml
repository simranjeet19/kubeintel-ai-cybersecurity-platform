apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-digest-exporter-egress
  namespace: kubeintel
spec:
  podSelector:
    matchLabels:
      app: digest-exporter
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - ports:
        - protocol: TCP
          port: 443
