# Argo CD Application CRD for KubeIntel
#
# Prerequisites:
#   kubectl create namespace argocd
#   kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.0/manifests/install.yaml
#   kubectl wait --namespace argocd --for=condition=ready pod --selector=app.kubernetes.io/name=argocd-server --timeout=180s
#
# Then apply this file:
#   kubectl apply -f k8s/07-crds/argocd-application.yaml
#
# Access Argo CD UI:
#   kubectl port-forward svc/argocd-server -n argocd 8080:443
#   Open: https://localhost:8080
#   Username: admin
#   Password: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeintel
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/simranjeet19/kubeintel-ai-cybersecurity-platform
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: kubeintel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
