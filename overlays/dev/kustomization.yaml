apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubeintel

resources:
  - ../../k8s

patches:
  # lower resource limits for dev — fits inside UTM VMs
  - path: summarizer-resources-patch.yaml
  - path: n8n-resources-patch.yaml
  - path: postgres-resources-patch.yaml
  # remove HPA — no metrics-server needed in dev
  - patch: |-
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: summarizer-api-hpa
        namespace: kubeintel
